<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro Cumpleanos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="is-intro intro-only">
  <main class="stage" id="introStage">
    <div class="backdrop"></div>
    <div class="overlay"></div>
    <div class="stars stars-a"></div>
    <div class="stars stars-b"></div>
    <div class="starfall" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="floating-balloons" aria-hidden="true">
      <span class="intro-balloon balloon-left"></span>
      <span class="intro-balloon balloon-center"></span>
      <span class="intro-balloon balloon-right"></span>
      <span class="intro-balloon balloon-small"></span>
    </div>
    <div class="bubbles" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <section class="hero">
      <p class="eyebrow">Un momento magico para recordar</p>
      <h1>La aventura del pequeno protagonista</h1>
      <p class="subtitle">
        Un recorrido tierno, alegre y lleno de color con sus fotos favoritas.
      </p>
      <div class="ribbon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="slideshow-shell">
        <div class="glow glow-left"></div>
        <div class="glow glow-right"></div>
        <div class="sparkles" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="slideshow" id="slideshow" aria-live="polite"></div>
        <div class="frame-decor frame-top"></div>
        <div class="frame-decor frame-bottom"></div>
      </div>

      <div class="controls">
        <button id="startButton" class="start-button hidden" type="button">Activar musica</button>
        <div class="progress-wrap" aria-hidden="true">
          <span class="progress-label">Recorrido</span>
          <div class="progress-bar">
            <span id="progressFill"></span>
          </div>
        </div>
      </div>
    </section>

    <div class="intro-finish" id="introFinish" aria-hidden="true">
      <div class="finish-glow"></div>
      <p class="finish-kicker">Gracias por ser parte</p>
      <h2>Un cumpleanos para recordar</h2>
    </div>

    <audio id="backgroundMusic" loop preload="auto" autoplay playsinline>
      <source src="music/fondo.mp3" type="audio/mpeg">
    </audio>
  </main>

  <script src="script.js"></script>
</body>
</html>
